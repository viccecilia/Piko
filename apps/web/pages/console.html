<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Piko 控制台</title>
  <style>
    :root {
      --bg: #f5f7fa;
      --panel: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d9e0ea;
      --green: #0f766e;
      --blue: #1d4ed8;
      --orange: #b45309;
      --red: #b91c1c;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 24px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }
    h1, h2, h3, p { margin-top: 0; }
    h1 { margin-bottom: 4px; font-size: 24px; letter-spacing: 0; }
    h2 { font-size: 17px; margin-bottom: 12px; }
    h3 { font-size: 15px; margin-bottom: 6px; }
    .sub { color: var(--muted); font-size: 13px; margin-bottom: 0; }
    main { padding: 18px 24px 32px; }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }
    button, a.button {
      min-height: 36px;
      border: 0;
      border-radius: 6px;
      background: var(--green);
      color: #fff;
      padding: 8px 12px;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
    }
    a.button.secondary { background: #344054; }
    .grid {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 14px;
      margin-top: 14px;
    }
    .metrics {
      display: grid;
      grid-template-columns: repeat(4, minmax(120px, 1fr));
      gap: 10px;
    }
    .panel, .metric, .row {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }
    .panel { padding: 14px; }
    .metric { padding: 12px; }
    .metric span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
    }
    .metric strong {
      display: block;
      margin-top: 4px;
      font-size: 25px;
    }
    .row { padding: 12px; margin-top: 9px; }
    .row-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }
    .badge {
      border-radius: 999px;
      padding: 3px 9px;
      background: #e5e7eb;
      color: #374151;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }
    .publish_candidate { background: #dcfce7; color: #166534; }
    .watchlist_waiting_for_answer { background: #fef3c7; color: var(--orange); }
    .conflict_explainer { background: #dbeafe; color: var(--blue); }
    .blocked_high_risk { background: #fee2e2; color: var(--red); }
    .bar {
      height: 8px;
      border-radius: 999px;
      background: #e5e7eb;
      margin-top: 9px;
      overflow: hidden;
    }
    .bar > i { display: block; height: 100%; background: var(--green); }
    .small { color: var(--muted); font-size: 13px; line-height: 1.45; margin-bottom: 0; }
    .status-line {
      display: grid;
      grid-template-columns: repeat(3, minmax(120px, 1fr));
      gap: 10px;
    }
    .mono {
      font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
      font-size: 12px;
      color: #475467;
      word-break: break-all;
    }
    @media (max-width: 980px) {
      header, .row-head { display: block; }
      .grid, .metrics, .status-line { grid-template-columns: 1fr; }
      .toolbar { margin-top: 12px; }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>Piko 控制台</h1>
      <p class="sub">内部操作视图：市场发现、排行、候选流转和安全状态。</p>
    </div>
    <div class="toolbar">
      <button id="refresh">刷新数据</button>
      <a class="button secondary" href="/discovery/window">Discovery</a>
      <a class="button secondary" href="/verification/window">Verification</a>
      <a class="button secondary" href="/site">网页</a>
    </div>
  </header>
  <main>
    <div class="metrics" id="metrics"></div>
    <div class="grid">
      <section class="panel">
        <h2>当前热门游戏 Top 5</h2>
        <div id="hotGames"></div>
      </section>
      <section class="panel">
        <h2>系统安全状态</h2>
        <div class="status-line" id="safety"></div>
        <h2 style="margin-top:16px;">Endpoint 验证</h2>
        <p class="small" id="endpoint">正在读取...</p>
      </section>
      <section class="panel">
        <h2>必须查攻略的问题</h2>
        <div id="mustCheck"></div>
      </section>
      <section class="panel">
        <h2>未解决 / 冲突 / 高风险</h2>
        <div id="buckets"></div>
      </section>
    </div>
  </main>
  <script>
    const bucketLabels = {
      hot_unanswered_watchlist_questions: "未解决高热问题",
      conflict_answer_topics: "冲突答案榜",
      high_risk_blocked_topics: "高风险阻断榜"
    };

    function metric(label, value) {
      return `<div class="metric"><span>${label}</span><strong>${value}</strong></div>`;
    }

    function row(title, badge, score, detail) {
      const width = Math.max(0, Math.min(100, Number(score || 0)));
      return `
        <article class="row">
          <div class="row-head">
            <div>
              <h3>${title}</h3>
              <p class="small">${detail || ""}</p>
            </div>
            <span class="badge ${badge || ""}">${badge || "candidate"}</span>
          </div>
          <div class="bar"><i style="width:${width}%"></i></div>
        </article>
      `;
    }

    async function loadEndpointSummary() {
      try {
        const response = await fetch("/discovery/real-source/collect", {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({query: "market", limit_per_source: 3})
        });
        const data = await response.json();
        if (!response.ok) {
          document.getElementById("endpoint").textContent = `默认真实采集已阻断：${data.detail}`;
          return;
        }
        document.getElementById("endpoint").textContent = `真实采集完成：${data.questions?.length || 0} questions`;
      } catch (error) {
        document.getElementById("endpoint").textContent = `Endpoint 检查失败：${error.message}`;
      }
    }

    async function load() {
      const [rankingsRes, healthRes] = await Promise.all([
        fetch("/discovery/rankings?limit=5"),
        fetch("/health")
      ]);
      const rankings = await rankingsRes.json();
      const health = await healthRes.json();
      const buckets = rankings.question_ranking_buckets || {};
      document.getElementById("metrics").innerHTML = [
        metric("运行模式", rankings.mode || "fixture"),
        metric("Top 游戏", (rankings.real_market_hot_games_top_5 || []).length),
        metric("必须查攻略", (buckets.must_check_guide_topics || []).length),
        metric("真实采集", String(rankings.real_collection_performed))
      ].join("");
      document.getElementById("hotGames").innerHTML = (rankings.real_market_hot_games_top_5 || []).map(game =>
        row(game.game_name, "hot", game.ranking_score, `热度 ${game.heat_score} / 讨论 ${game.discussion_velocity} / 来源 ${game.source_diversity}`)
      ).join("") || `<p class="small">暂无热门游戏。</p>`;
      document.getElementById("mustCheck").innerHTML = (buckets.must_check_guide_topics || []).map(item =>
        row(`${item.game_name}: ${item.need_key}`, item.decision, item.guide_need_score, item.representative_question)
      ).join("") || `<p class="small">暂无候选。</p>`;
      document.getElementById("buckets").innerHTML = Object.keys(bucketLabels).map(key => {
        const items = buckets[key] || [];
        return `<h3>${bucketLabels[key]}</h3>` + (items.map(item =>
          row(`${item.game_name}: ${item.need_key}`, item.decision, item.guide_need_score, item.representative_question)
        ).join("") || `<p class="small">暂无数据。</p>`);
      }).join("");
      document.getElementById("safety").innerHTML = [
        metric("API", health.status || "unknown"),
        metric("Agents", health.registered_agents ?? "-"),
        metric("发布", health.publishing_enabled ? "enabled" : "disabled")
      ].join("");
      await loadEndpointSummary();
    }

    document.getElementById("refresh").addEventListener("click", load);
    load();
  </script>
</body>
</html>
