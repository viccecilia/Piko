<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Piko 游戏攻略雷达</title>
  <style>
    :root {
      --bg: #fbfcfd;
      --ink: #101828;
      --muted: #667085;
      --line: #d9e0ea;
      --panel: #ffffff;
      --green: #0f766e;
      --blue: #2563eb;
      --red: #b91c1c;
      --amber: #b45309;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      background: var(--bg);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 22px;
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,0.94);
      position: sticky;
      top: 0;
      z-index: 2;
    }
    .brand { font-size: 20px; font-weight: 900; }
    nav a { color: var(--ink); text-decoration: none; font-weight: 700; font-size: 14px; }
    .hero {
      min-height: 58vh;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(300px, 520px);
      gap: 28px;
      align-items: center;
      padding: 48px 24px 36px;
      background:
        linear-gradient(120deg, rgba(15,118,110,0.10), rgba(37,99,235,0.08)),
        repeating-linear-gradient(135deg, rgba(16,24,40,0.04) 0 1px, transparent 1px 18px);
    }
    .hero h1 {
      margin: 0;
      font-size: clamp(36px, 7vw, 72px);
      line-height: 1;
      letter-spacing: 0;
    }
    .hero p {
      max-width: 720px;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.55;
    }
    .radar {
      min-height: 320px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 18px;
    }
    .radar-line {
      display: grid;
      grid-template-columns: 120px 1fr 48px;
      gap: 10px;
      align-items: center;
      margin: 14px 0;
    }
    .track {
      height: 12px;
      border-radius: 999px;
      background: #e5e7eb;
      overflow: hidden;
    }
    .track i { display: block; height: 100%; background: var(--green); }
    main { padding: 28px 24px 48px; }
    .section-head {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: end;
      margin: 20px 0 12px;
    }
    h2 { margin: 0; font-size: 24px; }
    .note { color: var(--muted); margin: 4px 0 0; }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(220px, 1fr));
      gap: 14px;
    }
    article {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 16px;
      min-height: 180px;
    }
    article h3 { margin: 0 0 8px; font-size: 18px; }
    article p { color: var(--muted); line-height: 1.5; }
    .badge {
      display: inline-block;
      border-radius: 999px;
      padding: 3px 9px;
      font-size: 12px;
      font-weight: 800;
      background: #e5e7eb;
      color: #344054;
      margin-bottom: 12px;
    }
    .publish_candidate { background: #dcfce7; color: #166534; }
    .watchlist_waiting_for_answer { background: #fef3c7; color: var(--amber); }
    .conflict_explainer { background: #dbeafe; color: var(--blue); }
    .blocked_high_risk { background: #fee2e2; color: var(--red); }
    .cta {
      margin-top: 28px;
      border-top: 1px solid var(--line);
      padding-top: 20px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .button {
      display: inline-flex;
      align-items: center;
      min-height: 38px;
      border-radius: 6px;
      padding: 8px 13px;
      background: var(--green);
      color: white;
      text-decoration: none;
      font-weight: 800;
    }
    .button.secondary { background: #344054; }
    footer {
      border-top: 1px solid var(--line);
      padding: 18px 24px 28px;
      color: var(--muted);
      font-size: 13px;
    }
    @media (max-width: 900px) {
      .hero, .grid { grid-template-columns: 1fr; }
      .section-head { display: block; }
    }
  </style>
</head>
<body>
  <nav>
    <div class="brand">Piko</div>
    <div>
      <a href="/site">网页</a>
      <span aria-hidden="true"> · </span>
      <a href="/console">控制台</a>
    </div>
  </nav>
  <section class="hero">
    <div>
      <h1>Piko 攻略库</h1>
      <p>这里是玩家真正查阅攻略的地方。Piko 会把通过证据链整理出的内容放成可读页面，并保留来源、风险提示和发布状态。</p>
      <div class="cta">
        <a class="button" href="#articles">看攻略</a>
        <a class="button secondary" href="/console">打开控制台</a>
      </div>
    </div>
    <aside class="radar">
      <h2>站内攻略状态</h2>
      <p class="note">当前是本地内容站预览；不会部署到公网，也不会自动发布。</p>
      <div id="radarLines"></div>
    </aside>
  </section>
  <main>
    <div class="section-head" id="articles">
      <div>
        <h2>攻略文章</h2>
        <p class="note">玩家可直接打开阅读。未发布内容会显示本地预览状态。</p>
      </div>
    </div>
    <div class="grid" id="articleGrid"></div>

    <div class="section-head">
      <div>
        <h2>攻略机会雷达</h2>
        <p class="note">这些信号帮助我们决定下一批该写什么。</p>
      </div>
    </div>
    <div class="grid" id="guideGrid"></div>

    <div class="section-head">
      <div>
        <h2>问题分流</h2>
        <p class="note">已有答案、未解决高热、冲突答案、高风险阻断会走不同路径。</p>
      </div>
    </div>
    <div class="grid" id="bucketGrid"></div>
  </main>
  <footer>
    Piko 当前不会默认联网、不会抓取全文、不会自动发布。这里展示的是本地站内阅读页。
  </footer>
  <script>
    function bar(name, value, detail) {
      const width = Math.max(0, Math.min(100, Number(value || 0)));
      return `<div class="radar-line"><strong>${name}</strong><div class="track"><i style="width:${width}%"></i></div><span>${value}</span></div><p class="note">${detail || ""}</p>`;
    }
    function card(item, label) {
      return `
        <article>
          <span class="badge ${item.decision || ""}">${label || item.decision || "candidate"}</span>
          <h3>${item.game_name}: ${item.need_key}</h3>
          <p>${item.representative_question || item.recommended_article_intent || ""}</p>
          <p>攻略需求分：<strong>${item.guide_need_score || item.content_opportunity_score || 0}</strong></p>
        </article>
      `;
    }
    async function load() {
      const [rankingResponse, articleResponse] = await Promise.all([
        fetch("/discovery/rankings?limit=5"),
        fetch("/site/articles.json")
      ]);
      const data = await rankingResponse.json();
      const articleData = await articleResponse.json();
      const games = data.real_market_hot_games_top_5 || [];
      document.getElementById("radarLines").innerHTML = games.map(game =>
        bar(game.game_name, game.ranking_score, `讨论 ${game.discussion_velocity} / 来源 ${game.source_diversity}`)
      ).join("") || `<p class="note">暂无热度信号。</p>`;
      document.getElementById("articleGrid").innerHTML = (articleData.articles || []).map(article => `
        <article>
          <span class="badge ${article.publish_ready ? "publish_candidate" : "watchlist_waiting_for_answer"}">${article.publish_ready ? "可发布候选" : "本地预览"}</span>
          <h3>${article.game}</h3>
          <p>${article.question}</p>
          <p>验证状态：<strong>${article.verification_status}</strong></p>
          <a class="button" href="${article.url}">打开攻略</a>
        </article>
      `).join("") || `<article><h3>暂无攻略</h3><p>等待候选内容生成。</p></article>`;
      const buckets = data.question_ranking_buckets || {};
      document.getElementById("guideGrid").innerHTML = (buckets.must_check_guide_topics || []).map(item =>
        card(item, "必须查")
      ).join("") || `<article><h3>暂无候选</h3><p>等待更多来源信号。</p></article>`;
      const bucketCards = [
        ...(buckets.hot_answered_questions || []).slice(0, 2).map(item => card(item, "已有答案")),
        ...(buckets.hot_unanswered_watchlist_questions || []).slice(0, 2).map(item => card(item, "监控中")),
        ...(buckets.conflict_answer_topics || []).slice(0, 2).map(item => card(item, "冲突答案")),
        ...(buckets.high_risk_blocked_topics || []).slice(0, 2).map(item => card(item, "高风险"))
      ];
      document.getElementById("bucketGrid").innerHTML = bucketCards.join("") || `<article><h3>暂无分流</h3><p>等待更多来源信号。</p></article>`;
    }
    load();
  </script>
</body>
</html>
